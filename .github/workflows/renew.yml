name: JustRunMy 自动续期 (多账号版)
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 */2 * *'

jobs:
  renew:
    runs-on: ubuntu-latest
    # 核心配置：使用矩阵实现多账号循环
    strategy:
      matrix:
        # 定义账号索引，你有几个账号就写几个，比如 [1, 2]
        account_index: [1, 2]
      fail-fast: false # 其中一个账号失败，不影响另一个

    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 🛠️ 安装环境
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool fonts-noto-cjk
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 🚀 运行原版脚本
        env:
          # 关键点：在这里做环境变量映射
          # 如果当前是账号 1，就取 Secrets 里的 EML_1 给脚本看
          JUSTRUNMY_EMAIL: ${{ matrix.account_index == 1 && secrets.EML_1 || secrets.EML_2 }}
          JUSTRUNMY_PASSWORD: ${{ matrix.account_index == 1 && secrets.PWD_1 || secrets.PWD_2 }}
          # TG 通知变量映射
          TG_BOT_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_ID }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python justrunmy_renew.py

      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-acc-${{ matrix.account_index }}
          path: "*.png"
