name: JustRunMy 自动续期
on:
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        shell: bash
        env:
          ALL_SECRETS: ${{ toJson(secrets) }}
        run: |
          COUNT=$(echo "$ALL_SECRETS" | jq -r 'keys[] | select(startswith("EML_"))' | sed 's/EML_//' | sort -n | jq -R . | jq -s -c .)
          echo "matrix=$COUNT" >> $GITHUB_OUTPUT

  renew:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        account_index: ${{ fromJson(needs.setup.outputs.matrix) }}
    
    steps:
      - name: 下载代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 启动代理 (可选 - sing-box)
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          if [ -z "$PROXY_URL" ]; then
            echo "未设置 PROXY_URL，将使用直连。"
            exit 0
          fi

          echo "检测到 PROXY_URL，启动 sing-box 代理..."

          # 下载 sing-box
          SINGBOX_VER="1.11.0"
          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VER}/sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          tar -xzf "sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          mv "sing-box-${SINGBOX_VER}-linux-amd64/sing-box" ./sing-box
          chmod +x ./sing-box
          rm -rf "sing-box-${SINGBOX_VER}-linux-amd64" "sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"

          # 用 Python 解析 PROXY_URL 并生成 config.json
          python proxy_handler.py

          # 启动 sing-box
          nohup ./sing-box run -c config.json > singbox.log 2>&1 &
          sleep 3

          # 验证本地代理是否正常
          echo "测试本地代理连通性..."
          PROXY_IP=$(curl -s -x http://127.0.0.1:8080 https://api.ipify.org --connect-timeout 10 || echo "FAILED")
          echo "代理出口 IP: $PROXY_IP"

          if [ "$PROXY_IP" = "FAILED" ]; then
            echo "代理启动失败，查看日志："
            cat singbox.log
            exit 1
          fi

          # 写入 PROXY_URL 环境变量供后续步骤使用
          echo "PROXY_URL=$PROXY_URL" >> $GITHUB_ENV

      - name: 安装环境依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool fonts-noto-cjk
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 随机延迟 (防风控)
        if: github.event_name == 'schedule'
        run: |
          RANDOM_DELAY=$(( RANDOM % 54000 ))
          echo "账号 ${{ matrix.account_index }} 随机延迟 $RANDOM_DELAY 秒后启动..."
          sleep $RANDOM_DELAY

      - name: 运行续期脚本
        env:
          JUSTRUNMY_EMAIL: ${{ secrets[format('EML_{0}', matrix.account_index)] }}
          JUSTRUNMY_PASSWORD: ${{ secrets[format('PWD_{0}', matrix.account_index)] }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_ID: ${{ secrets.TG_ID }}
          PROXY_URL: ${{ env.PROXY_URL }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python reset_timer.py

      - name: 上传错误截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-acc-${{ matrix.account_index }}
          path: "*.png"
